name: Feature Request
description: Suggest a new check or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
  - type: textarea
    id: solution
    attributes:
      label: What would you like to see?
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - "New IAM risk check"
        - "New workflow pattern detection"
        - "New output format"
        - "New cloud provider (GCP/Azure)"
        - "Performance improvement"
        - "Documentation"
        - "Other"
